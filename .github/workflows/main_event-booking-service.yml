# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - event-booking-service

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: eventapicontainer-apapfzb4dzhmemat.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_915CA9A8749440F0AA9244A5C9366783 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_66F8A3B1F7F442BE9F0F46AEB280A072 }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: eventapicontainer-apapfzb4dzhmemat.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_915CA9A8749440F0AA9244A5C9366783 }}/event-booking-service:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_A10F88B287A943CBB195F19AA9F8855B }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_09C9941F62F644F9A99A2E5224180785 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_8F96ABED53BE4E2DBE35DE4EAA436AFE }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'event-booking-service'
          slot-name: 'Production'
          images: 'eventapicontainer-apapfzb4dzhmemat.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_915CA9A8749440F0AA9244A5C9366783 }}/event-booking-service:${{ github.sha }}'
          