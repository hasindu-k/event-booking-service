openapi: 3.0.0
info:
  title: Event Booking Service API
  version: 1.0.0
  description: API for managing event bookings
servers:
  - url: http://localhost:3001/api/bookings
    description: Local server
paths:
  /:
    get:
      summary: List all bookings
      tags:
        - Bookings
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [PENDING, CONFIRMED, CANCELLED]
          required: false
          description: Filter by booking status
        - in: query
          name: userId
          schema:
            type: string
          required: false
          description: Filter by user ID
        - in: query
          name: eventId
          schema:
            type: string
          required: false
          description: Filter by event ID
        - in: query
          name: sortBy
          schema:
            type: string
            enum: [createdAt, eventDate]
            default: createdAt
          required: false
          description: Field to sort by
        - in: query
          name: sortOrder
          schema:
            type: string
            enum: [asc, desc]
            default: desc
          required: false
          description: Sort order
      responses:
        "200":
          description: List of all bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BookingDetails"
        "500":
          description: Internal server error
    post:
      summary: Create a new booking
      tags:
        - Bookings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookingRequest"
      responses:
        "201":
          description: Booking created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingResponse"
        "400":
          description: Invalid input
        "500":
          description: Internal server error
  /{bookingId}:
    get:
      summary: Get booking by ID
      tags:
        - Bookings
      parameters:
        - in: path
          name: bookingId
          schema:
            type: string
          required: true
          description: The booking ID
      responses:
        "200":
          description: Booking details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingDetails"
        "404":
          description: Booking not found
        "500":
          description: Internal server error
    delete:
      summary: Cancel a booking
      tags:
        - Bookings
      parameters:
        - in: path
          name: bookingId
          schema:
            type: string
          required: true
          description: The booking ID
      responses:
        "200":
          description: Booking cancelled successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelBookingResponse"
        "404":
          description: Booking not found
        "500":
          description: Internal server error
  /{bookingId}/payment:
    patch:
      summary: Update booking payment status
      tags:
        - Bookings
      parameters:
        - in: path
          name: bookingId
          schema:
            type: string
          required: true
          description: The booking ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - paymentStatus
              properties:
                paymentStatus:
                  type: string
                  description: New payment status
                  example: SUCCESS
      responses:
        "200":
          description: Payment status updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingDetails"
        "400":
          description: Invalid input
        "404":
          description: Booking not found
        "500":
          description: Internal server error
  /user/me:
    get:
      summary: Get current user bookings
      tags:
        - Bookings
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [PENDING, CONFIRMED, CANCELLED]
          required: false
          description: Filter by booking status
        - in: query
          name: sortBy
          schema:
            type: string
            enum: [createdAt, eventDate]
            default: createdAt
          required: false
          description: Field to sort by
        - in: query
          name: sortOrder
          schema:
            type: string
            enum: [asc, desc]
            default: desc
          required: false
          description: Sort order
      responses:
        "200":
          description: List of current user bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BookingDetails"
        "500":
          description: Internal server error
  /user/{userId}:
    get:
      summary: Get bookings by user ID
      tags:
        - Bookings
      parameters:
        - in: path
          name: userId
          schema:
            type: string
          required: true
          description: The user ID
        - in: query
          name: status
          schema:
            type: string
            enum: [PENDING, CONFIRMED, CANCELLED]
          required: false
          description: Filter by booking status
        - in: query
          name: sortBy
          schema:
            type: string
            enum: [createdAt, eventDate]
            default: createdAt
          required: false
          description: Field to sort by
        - in: query
          name: sortOrder
          schema:
            type: string
            enum: [asc, desc]
            default: desc
          required: false
          description: Sort order
      responses:
        "200":
          description: List of user bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BookingDetails"
        "500":
          description: Internal server error
  /event/{eventId}:
    get:
      summary: Get bookings by event ID
      tags:
        - Bookings
      parameters:
        - in: path
          name: eventId
          schema:
            type: string
          required: true
          description: The event ID
        - in: query
          name: status
          schema:
            type: string
            enum: [PENDING, CONFIRMED, CANCELLED]
          required: false
          description: Filter by booking status
        - in: query
          name: sortBy
          schema:
            type: string
            enum: [createdAt, eventDate]
            default: createdAt
          required: false
          description: Field to sort by
        - in: query
          name: sortOrder
          schema:
            type: string
            enum: [asc, desc]
            default: desc
          required: false
          description: Sort order
      responses:
        "200":
          description: List of event bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BookingDetails"
        "500":
          description: Internal server error

components:
  schemas:
    CreateBookingRequest:
      type: object
      required:
        - eventId
        - numberOfTickets
      properties:
        eventId:
          type: string
          description: ID of the event to book
        numberOfTickets:
          type: integer
          minimum: 1
          description: Number of tickets to book

    BookingResponse:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        userName:
          type: string
        eventId:
          type: string
        eventName:
          type: string
        eventDate:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        venue:
          type: string
        numberOfTickets:
          type: integer
        totalAmount:
          type: number
        serviceFee:
          type: number
        status:
          type: string
        paymentStatus:
          type: string

    BookingDetails:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        userName:
          type: string
        eventId:
          type: string
        eventName:
          type: string
        eventDate:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        venue:
          type: string
        numberOfTickets:
          type: integer
        totalAmount:
          type: number
        serviceFee:
          type: number
        status:
          type: string
        paymentStatus:
          type: string

    CancelBookingResponse:
      type: object
      properties:
        booking:
          $ref: "#/components/schemas/BookingDetails"
        paymentRefunded:
          type: boolean
        seatsRestored:
          type: boolean
        message:
          type: string
